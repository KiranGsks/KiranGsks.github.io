<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UniPDI</title>
  <!--
    GitHub Pages SPA redirect hack.
    GitHub Pages doesn't support server-side rewrites, so when a user
    navigates to e.g. /inspect/car and refreshes, GitHub returns 404.
    This 404.html catches that and redirects to index.html with the
    path encoded in a query parameter, which index.html then restores.
  -->
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // MIT License - https://github.com/rafgraph/spa-github-pages
    var pathSegmentsToKeep = 1; // Keep '/pdi-testing' prefix

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
